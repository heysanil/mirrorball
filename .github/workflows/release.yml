name: Release DMG

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version (no leading v); defaults to MARKETING_VERSION in Project.swift"
        required: false
        default: ""

permissions:
  contents: write   # create the Release and upload the DMG asset

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-dmg:
    runs-on: nscloud-macos-tahoe-arm64-6x14
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so `git rev-list --count HEAD` yields a monotonic
          # CFBundleVersion for Sparkle, and so the appcast can be committed back.
          fetch-depth: 0

      - name: Select Xcode 26
        run: |
          if [[ -d /Applications/Xcode_26.app ]]; then
            sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
          fi
          sudo xcodebuild -runFirstLaunch || true
          xcodebuild -version

      - name: Install Tuist
        run: brew install tuist

      - name: Install Sparkle tools
        env:
          SPARKLE_VERSION: "2.9.3"   # keep in lockstep with Tuist/Package.swift
        run: |
          curl -fsSL -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          # exposes sign_update (and generate_appcast) to later steps
          echo "/tmp/sparkle/bin" >> "$GITHUB_PATH"
          /tmp/sparkle/bin/sign_update --version || true

      - name: Resolve version
        id: ver
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            V="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "$INPUT_VERSION" ]]; then
            V="$INPUT_VERSION"
          else
            V="$(grep -m1 'MARKETING_VERSION' Project.swift | sed -E 's/.*"([0-9.]+)".*/\1/')"
          fi
          # Reject anything that isn't a plain version string before it flows
          # into later steps / filenames (defends against crafted tag names).
          if [[ ! "$V" =~ ^[A-Za-z0-9._+-]+$ ]]; then
            echo "::error::Refusing unsafe version string: $V"
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $V"

      - name: Build, sign, notarize, package
        id: package
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          DEVELOPER_ID_APP_CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_APP_CERT_P12_BASE64 }}
          DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
          NOTARY_API_ISSUER_ID: ${{ secrets.NOTARY_API_ISSUER_ID }}
          NOTARY_API_KEY_P8_BASE64: ${{ secrets.NOTARY_API_KEY_P8_BASE64 }}
          # EdDSA private key (from Sparkle's generate_keys -x) used to sign the
          # DMG and the appcast. Passed to sign_update via stdin, never to disk.
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        run: ./scripts/package-dmg.sh --version "$VERSION"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Mirrorball-${{ steps.ver.outputs.version }}
          path: ${{ steps.package.outputs.dmg }}
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          files: ${{ steps.package.outputs.dmg }}
          fail_on_unmatched_files: true

      # The package step appended the signed <item> to docs/appcast.xml in the
      # working tree. Commit it back to main, which GitHub Pages serves at
      # https://heysanil.github.io/mirrorball/appcast.xml (the app's SUFeedURL).
      - name: Publish appcast to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if git diff --quiet -- docs/appcast.xml; then
            echo "appcast unchanged; nothing to publish"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # The tag build is in detached HEAD. Carry the appcast edit onto main and
          # push there so Pages picks it up (tag is expected to point at main HEAD).
          git fetch origin main
          git stash push -- docs/appcast.xml
          git switch main
          git stash pop
          git add docs/appcast.xml
          git commit -m "chore(appcast): publish v$VERSION"
          git push origin main
